<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

/* タイトル */
.title{
    text-align:center;
    font-size:16px;
    padding:6px 0;
    border-bottom:1px solid #00ffcc;
}

/* 上部ボタンエリア */
.controls{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 40px 40px;
    gap:6px;
    padding:6px;
}

/* ボタン共通 */
button{
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    font-size:12px;
}

/* 配置 */
#generateBtn{
    grid-row:1 / span 2; /* 左側を縦に2マス使用 */
    grid-column:1;
}

#modeBtn{
    grid-row:1;
    grid-column:2;
}

#historyBtn{
    grid-row:2;
    grid-column:2;
}

#favBtn{
    grid-row:2;
    grid-column:2;
    justify-self:end;
    width:45%;
}

/* 出力 */
#output{
    font-size:11px;
    white-space:pre-wrap;
    padding:8px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="title">City Generator</div>

<div class="controls">
    <button id="generateBtn">Generate</button>
    <button id="modeBtn">Mode</button>
    <button id="historyBtn">History</button>
    <button id="favBtn">⭐</button>
</div>

<div id="output"></div>

<script src="data.js"></script>

<script>
let currentMode = "cyberpunk";

/* ランダム取得 */
function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* 生成 */
function generate(){
    const d = data[currentMode];

    const result =
`建築: ${pick(d.architecture)}
環境: ${pick(d.environment)}
社会: ${pick(d.society)}
雰囲気: ${pick(d.mood)}
地区: ${pick(d.district)}
施設: ${pick(d.facility)}
職業: ${pick(d.jobs)}
事件: ${pick(d.incidents)}
主要人物: ${pick(d.characters)}`;

    document.getElementById("output").textContent = result;
}

/* モード切替（仮：2種） */
function toggleMode(){
    currentMode = (currentMode === "cyberpunk") ? "apocalypse" : "cyberpunk";
}

/* イベント */
document.getElementById("generateBtn").onclick = generate;
document.getElementById("modeBtn").onclick = toggleMode;
document.getElementById("historyBtn").onclick = () => alert("履歴（未実装）");
document.getElementById("favBtn").onclick = () => alert("お気に入り（未実装）");
</script>

</body>
</html>
