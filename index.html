<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>

/* ===== モードカラー ===== */
:root{
    --main:#00ffcc;
    --accent:#ff2bd6;
    --bg:black;
}

body.cyberpunk{ --main:#00ffcc; --accent:#ff2bd6; --bg:black; }
body.apocalypse{ --main:#ff4444; --accent:#ffaa00; --bg:#1a0000; }
body.future{ --main:#66aaff; --accent:#ffffff; --bg:#001122; }
body.fantasy{ --main:#66ff99; --accent:#cc66ff; --bg:#001a00; }

/* ===== 基本 ===== */
body{
    margin:0;
    background:var(--bg);
    color:var(--main);
    font-family:monospace;
    overflow:hidden;
    text-align:center;
}

/* タイトル */
.title{
    font-size:30px;
    margin-top:24px;
    margin-bottom:16px; /* ★拡張 */
    text-shadow:0 0 10px var(--main);
}

/* 画面 */
.screen{ display:none; }
.active{ display:block; }

/* ===== コントロール ===== */
.controls{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 34px 34px;
    gap:6px;
    padding:6px;
}

button, select{
    background:black;
    color:var(--main);
    border:1px solid var(--main);
    font-size:12px;
    text-align:center;
    text-align-last:center;
    box-shadow:0 0 5px var(--main);
}

#generateBtn{
    grid-row:1 / span 2;
}

#modeSelect{
    width:100%;
}

/* 右下 */
.bottomRight{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:6px;
}

/* 出力 */
#output{
    margin-top:6px;
    font-size:16px;
    line-height:1.6;
}

.block{ margin-bottom:6px; }

/* ★建築の上余白を拡張 */
.block:first-child .label{
    margin-top:8px;
}

.label{
    color:var(--accent);
    font-size:12px;
    text-shadow:0 0 6px var(--accent);
    margin-bottom:1px;
}

.value{
    font-size:14px;
}

/* ===== 履歴 ===== */
#historyScreen{ padding:10px; }

#backBtn{
    position:absolute;
    top:10px;
    left:10px;
}

/* カード */
.card{
    border:1px solid;
    margin-bottom:8px;
    padding:6px;
    font-size:12px;
    text-align:left;
}

/* ★モード別カード色（固定用） */
.card.cyberpunk{ border-color:#00ffcc; color:#00ffcc; }
.card.apocalypse{ border-color:#ff4444; color:#ff4444; }
.card.future{ border-color:#66aaff; color:#66aaff; }
.card.fantasy{ border-color:#66ff99; color:#66ff99; }

.time{
    font-size:10px;
    margin-bottom:4px;
    color:#888;
}

/* ★2カラム構成 */
.cardContent{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:6px;
}

</style>
</head>

<body class="cyberpunk">

<div id="mainScreen" class="screen active">

<div class="title">City Generator</div>

<div class="controls">
    <button id="generateBtn">Generate</button>

    <select id="modeSelect">
        <option value="cyberpunk">Cyberpunk</option>
        <option value="apocalypse">Apocalypse</option>
        <option value="future">Future</option>
        <option value="fantasy">Fantasy</option>
    </select>

    <div class="bottomRight">
        <button id="historyBtn">History</button>
        <button id="favBtn">⭐</button>
    </div>
</div>

<div id="output"></div>

</div>

<!-- 履歴画面 -->
<div id="historyScreen" class="screen">
    <button id="backBtn">戻る</button>
    <h2>History</h2>
    <div id="historyList"></div>
</div>

<script src="data.js"></script>

<script>
let currentMode = "cyberpunk";
let historyData = [];

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){
    const d = data[currentMode];

    const result = {
        建築: pick(d.architecture),
        環境: pick(d.environment),
        社会: pick(d.society),
        雰囲気: pick(d.mood),
        地区: pick(d.district),
        施設: pick(d.facility),
        職業: pick(d.jobs),
        事件: pick(d.incidents),
        主要人物: pick(d.characters),
        mode: currentMode, /* ★保存 */
        time: new Date().toLocaleString()
    };

    historyData.unshift(result);

    let html = "";
    for(let key in result){
        if(key === "time" || key === "mode") continue;
        html += `
        <div class="block">
            <div class="label">${key}</div>
            <div class="value">${result[key]}</div>
        </div>`;
    }

    document.getElementById("output").innerHTML = html;
}

function changeMode(){
    const select = document.getElementById("modeSelect");
    currentMode = select.value;
    document.body.className = currentMode;
}

function showHistory(){
    document.getElementById("mainScreen").classList.remove("active");
    document.getElementById("historyScreen").classList.add("active");

    let html = "";

    historyData.forEach(item=>{
        html += `<div class="card ${item.mode}">
        <div class="time">${item.time}</div>

        <div class="cardContent">

        <div>
        <div>建築: ${item.建築}</div>
        <div>環境: ${item.環境}</div>
        <div>社会: ${item.社会}</div>
        <div>雰囲気: ${item.雰囲気}</div>
        <div>地区: ${item.地区}</div>
        </div>

        <div>
        <div>施設: ${item.施設}</div>
        <div>職業: ${item.職業}</div>
        <div>事件: ${item.事件}</div>
        <div>主要人物: ${item.主要人物}</div>
        </div>

        </div>
        </div>`;
    });

    document.getElementById("historyList").innerHTML = html;
}

function back(){
    document.getElementById("historyScreen").classList.remove("active");
    document.getElementById("mainScreen").classList.add("active");
}

generateBtn.onclick = generate;
modeSelect.onchange = changeMode;
historyBtn.onclick = showHistory;
backBtn.onclick = back;
favBtn.onclick = ()=>alert("お気に入り未実装");

</script>

</body>
</html>
