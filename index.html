<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
    text-align:center;
}

/* タイトル */
.title{
    font-size:26px;
    margin-top:20px;
    margin-bottom:8px; /* 少し詰める */
    text-shadow:0 0 10px #00ffcc;
}

/* ボタンエリア */
.controls{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 45px 45px;
    gap:6px;
    padding:6px;
}

/* ボタン */
button{
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    font-size:13px;
    text-align:center;
    box-shadow:0 0 5px #00ffcc;
}

/* 配置 */
#generateBtn{
    grid-row:1 / span 2;
    grid-column:1;
}

#modeBtn{
    grid-row:1;
    grid-column:2;
}

#historyBtn{
    grid-row:2;
    grid-column:2;
    width:48%;
    justify-self:start;
}

#favBtn{
    grid-row:2;
    grid-column:2;
    width:48%;
    justify-self:end;
}

/* 出力 */
#output{
    margin-top:6px; /* 少し詰める */
    font-size:16px;
    line-height:1.6; /* 行間も微調整 */
}

/* 各ブロック */
.block{
    margin-bottom:6px; /* ← 要素間を詰める */
}

/* 見出し */
.label{
    color:#ff2bd6;
    font-size:12px;
    text-shadow:0 0 6px #ff2bd6;
    margin-bottom:1px; /* ← 見出しと内容の間を詰める */
}

/* 内容 */
.value{
    font-size:18px;
    margin-top:0; /* 念のため余白除去 */
}
</style>
</head>

<body>

<div class="title">City Generator</div>

<div class="controls">
    <button id="generateBtn">Generate</button>
    <button id="modeBtn">Mode</button>
    <button id="historyBtn">History</button>
    <button id="favBtn">⭐</button>
</div>

<div id="output"></div>

<script src="data.js"></script>

<script>
let currentMode = "cyberpunk";

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){
    const d = data[currentMode];

    const resultHTML = `
<div class="block">
<div class="label">建築</div>
<div class="value">${pick(d.architecture)}</div>
</div>

<div class="block">
<div class="label">環境</div>
<div class="value">${pick(d.environment)}</div>
</div>

<div class="block">
<div class="label">社会</div>
<div class="value">${pick(d.society)}</div>
</div>

<div class="block">
<div class="label">雰囲気</div>
<div class="value">${pick(d.mood)}</div>
</div>

<div class="block">
<div class="label">地区</div>
<div class="value">${pick(d.district)}</div>
</div>

<div class="block">
<div class="label">施設</div>
<div class="value">${pick(d.facility)}</div>
</div>

<div class="block">
<div class="label">職業</div>
<div class="value">${pick(d.jobs)}</div>
</div>

<div class="block">
<div class="label">事件</div>
<div class="value">${pick(d.incidents)}</div>
</div>

<div class="block">
<div class="label">主要人物</div>
<div class="value">${pick(d.characters)}</div>
</div>
`;

    document.getElementById("output").innerHTML = resultHTML;
}

function toggleMode(){
    currentMode = (currentMode === "cyberpunk") ? "apocalypse" : "cyberpunk";
}

document.getElementById("generateBtn").onclick = generate;
document.getElementById("modeBtn").onclick = toggleMode;
document.getElementById("historyBtn").onclick = () => alert("履歴（未実装）");
document.getElementById("favBtn").onclick = () => alert("お気に入り（未実装）");
</script>

</body>
</html>
