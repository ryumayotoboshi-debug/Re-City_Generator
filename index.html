<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

/* 横並び */
.container{
    display:flex;
    height:100vh;
}

/* 左（Generate） */
.left{
    display:flex;
    align-items:flex-start;
    padding:8px;
}

/* 右 */
.right{
    flex:1;
    position:relative;
    padding:8px;
}

/* 出力 */
#output{
    font-size:11px;
    white-space:pre-wrap;
    line-height:1.4;
    margin-top:40px;
}

/* ボタン共通 */
button{
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    font-size:11px;

    height:32px; /* 横長に */
    padding:0 12px;
}

/* Generate */
#generateBtn{
    width:140px;
}

/* Mode（Generateの右） */
#modeBtn{
    position:absolute;
    top:8px;
    left:160px; /* Generate + 余白 */
    width:80px;
}

/* 下ボタン */
.bottom{
    position:absolute;
    bottom:8px;
    left:8px;
    right:8px;
    display:flex;
    justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

    <!-- 左 -->
    <div class="left">
        <button id="generateBtn">Generate</button>
    </div>

    <!-- 右 -->
    <div class="right">

        <button id="modeBtn">Mode</button>

        <div id="output"></div>

        <div class="bottom">
            <button id="historyBtn">History</button>
            <button id="favBtn">⭐</button>
        </div>

    </div>

</div>

<script src="data.js"></script>

<script>
let currentMode = "cyberpunk";

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){
    const d = data[currentMode];

    const result =
`建築: ${pick(d.architecture)}
環境: ${pick(d.environment)}
社会: ${pick(d.society)}
雰囲気: ${pick(d.mood)}
地区: ${pick(d.district)}
施設: ${pick(d.facility)}
職業: ${pick(d.jobs)}
事件: ${pick(d.incidents)}
主要人物: ${pick(d.characters)}`;

    document.getElementById("output").textContent = result;
}

function toggleMode(){
    currentMode = (currentMode === "cyberpunk") ? "apocalypse" : "cyberpunk";
}

document.getElementById("generateBtn").onclick = generate;
document.getElementById("modeBtn").onclick = toggleMode;

document.getElementById("historyBtn").onclick = () => alert("履歴（未実装）");
document.getElementById("favBtn").onclick = () => alert("お気に入り（未実装）");
</script>

</body>
</html>
