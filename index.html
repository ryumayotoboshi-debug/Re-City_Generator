<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Re：City Generator</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="IMG_6157.png">
<link rel="apple-touch-icon" href="IMG_6157.png">

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#0ff;
  text-align:center;
}

/* タイトル */
h1{
  margin:20px 0 10px 0;
}

/* ▼ ここで全体を少し上に寄せる */
#main{
  margin-top:-10px; /* ←追加（軽く上に） */
}

/* ▼ 項目間の余白を少し縮小 */
.result-block{
  margin:8px 0; /* 変更前: 12px程度想定 */
}

/* ▼ 見出し */
.result-title{
  font-size:13px; /* -1px調整 */
  opacity:0.7;
}

/* ▼ 要素 */
.result-value{
  font-size:17px; /* -1px調整 */
}

/* ボタン */
button{
  margin:10px;
  padding:10px 20px;
}

</style>
</head>

<body>

<h1>Re：City Generator</h1>

<div id="main">

<button onclick="generate()">生成</button>

<div id="result"></div>

</div>

<script src="data.js"></script>

<script>

let currentMode = "cyberpunk";

function generate(){

  const modeData = data[currentMode];

  let html = "";

  for(let key in modeData){

    const arr = modeData[key];
    const value = arr[Math.floor(Math.random()*arr.length)];

    html += `
    <div class="result-block">
      <div class="result-title">${key}</div>
      <div class="result-value">${value}</div>
    </div>
    `;
  }

  document.getElementById("result").innerHTML = html;
}

</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js');
  });
}
</script>

</body>
</html>
