<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">City Generator</h1>

<div id="mainScreen" class="screen active">

  <div class="button-zone">
    <button id="generateBtn">Generate</button>

    <div class="right-buttons">
      <button id="historyBtn">History</button>
      <button id="favoriteToggle">⭐︎</button>
    </div>
  </div>

  <div class="mode-buttons">
    <button onclick="setMode('Cyberpunk')">Cyberpunk</button>
    <button onclick="setMode('Synthwave')">Synthwave</button>
    <button onclick="setMode('DreamCore')">DreamCore</button>
  </div>

  <div id="output"></div>

</div>

<div id="historyScreen" class="screen">
  <div class="history-header">
    <button onclick="showMain()">← Back</button>
    <button onclick="showFavorites()">お気に入り</button>
  </div>
  <div id="historyList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
