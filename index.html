<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 生成画面 -->
<div id="generateScreen">

    <h1 class="title">City Generator</h1>

    <div class="buttonZone">
        <button onclick="generateCity()">Generate</button>
        <button onclick="openHistory()">History</button>
    </div>

    <div id="result"></div>

</div>


<!-- 履歴画面 -->
<div id="historyScreen">

    <div class="historyHeader">
        <button onclick="closeHistory()">戻る</button>
        <button onclick="toggleFavoriteView()">お気に入り</button>
    </div>

    <h2 class="historyTitle">History</h2>

    <div id="historyList"></div>

</div>

<script src="script.js"></script>
</body>
</html>
